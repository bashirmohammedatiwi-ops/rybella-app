services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rybella-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost:3307}
      - APP_KEY=${APP_KEY}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-rybella_db}
      - DB_USERNAME=${DB_USERNAME:-rybella_user}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rybella-net

  nginx:
    image: nginx:alpine
    container_name: rybella-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3307}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - rybella-net

  db:
    image: mysql:8.0
    container_name: rybella-db
    restart: unless-stopped
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-rybella_db}
      MYSQL_USER: rybella_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - rybella_db_data:/var/lib/mysql
    ports:
      - "${MYSQL_HOST_PORT:-3308}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - rybella-net

volumes:
  rybella_db_data:

networks:
  rybella-net:
    driver: bridge
